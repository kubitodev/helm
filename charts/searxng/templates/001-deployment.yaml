apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  labels:
    app.kubernetes.io/name: "searxng"
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: "searxng"
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: "searxng"
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "searxng" }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.env }}
          env:
          {{- if .Values.config.granian.enabled }}
            - name: GRANIAN_WORKERS
              value: {{ .Values.config.granian.workers | quote }}
            - name: GRANIAN_BLOCKING_THREADS
              value: {{ .Values.config.granian.blocking_threads | quote }}
            - name: GRANIAN_BACKPRESSURE
              value: {{ .Values.config.granian.backpressure | quote }}
            - name: GRANIAN_HTTP1_BUFFER_SIZE
              value: {{ .Values.config.granian.http1_buffer_size | quote }}
            - name: GRANIAN_HTTP1_KEEP_ALIVE
              value: {{ .Values.config.granian.http1_keep_alive | quote }}
            - name: GRANIAN_LOG_LEVEL
              value: {{ .Values.config.granian.log_level | quote }}
            - name: GRANIAN_LOG_ACCESS_ENABLED
              value: {{ .Values.config.granian.log_access_enabled | quote }}
          {{- end }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
          {{- if .Values.config.settings.enabled }}
            - mountPath: /etc/searxng/settings.yml
              name: searxng-settings
              subPath: settings.yml
              readOnly: true
          {{- end }}
          {{- if .Values.config.limiter.enabled }}
            - mountPath: /etc/searxng/limiter.toml
              name: searxng-limiter
              subPath: limiter.toml
              readOnly: true
          {{- end }}
          {{- if .Values.config.uwsgi.enabled }}
            - mountPath: /etc/searxng/uwsgi.ini
              name: searxng-uwsgi
              subPath: uwsgi.ini
              readOnly: true
          {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
      {{- if .Values.config.settings.enabled }}
        - name: searxng-settings
          configMap:
            name: searxng-settings
      {{- end }}
    {{- if .Values.config.limiter.enabled }}
        - name: searxng-limiter
          configMap:
            name: searxng-limiter
     {{- end }}
     {{- if .Values.config.uwsgi.enabled }}
        - name: searxng-uwsgi
          configMap:
            name: searxng-uwsgi
     {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
